<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator — Cruise the Creek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f0f0f;
            --fg: #f8f8f8;
            --accent: #00d9ff;
            --accent-dark: #0099bb;
            --border: #2a2a2a;
            --input-bg: #1a1a1a;
            --success: #00d966;
            --error: #ff4444;
            --warning: #ffaa00;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Courier New', monospace;
            line-height: 1.6;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            animation: slideDown 0.5s ease-out;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: normal;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--accent);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .form-wrapper {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            animation: fadeIn 0.6s ease-out 0.1s both;
        }

        .form-section {
            margin-bottom: 2.5rem;
        }

        .form-section:last-of-type {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 0.95rem;
            letter-spacing: 1px;
            margin-bottom: 1.2rem;
            color: var(--accent);
            text-transform: uppercase;
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-grid.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            color: var(--accent);
            text-transform: uppercase;
            opacity: 0.9;
        }

        input, textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--fg);
            padding: 0.8rem;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 217, 255, 0.1);
            background: rgba(0, 217, 255, 0.02);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .line-items-wrapper {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .line-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 1rem;
            margin-bottom: 1rem;
            align-items: end;
        }

        .line-item:last-child {
            margin-bottom: 0;
        }

        .line-item input {
            padding: 0.7rem;
            font-size: 0.9rem;
        }

        .remove-btn {
            background: var(--error);
            border: none;
            color: var(--bg);
            padding: 0.7rem 1.2rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .remove-btn:hover {
            background: #ff6666;
            transform: scale(1.05);
        }

        .add-line-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.6rem 1rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        .add-line-btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .totals-box {
            background: var(--bg);
            border: 1px solid var(--accent);
            padding: 1.2rem;
            margin-bottom: 2rem;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
        }

        .total-row.final {
            border-top: 2px solid var(--accent);
            padding-top: 0.8rem;
            margin-top: 0.8rem;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        button {
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid var(--accent);
            font-weight: bold;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--fg);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 217, 255, 0.25);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
        }

        .btn-secondary:hover {
            background: var(--accent);
            color: var(--bg);
            transform: translateY(-2px);
        }

        .status-message {
            padding: 1rem;
            margin-top: 1.5rem;
            border-left: 3px solid var(--success);
            background: rgba(0, 217, 102, 0.05);
            color: var(--success);
            display: none;
            animation: slideIn 0.4s ease-out;
            font-size: 0.9rem;
        }

        .status-message.active {
            display: block;
        }

        .status-message.error {
            border-left-color: var(--error);
            background: rgba(255, 68, 68, 0.05);
            color: var(--error);
        }

        .status-message.loading {
            border-left-color: var(--warning);
            background: rgba(255, 170, 0, 0.05);
            color: var(--warning);
        }

        .payment-link-box {
            background: var(--bg);
            border: 1px solid var(--accent);
            padding: 1.5rem;
            margin-top: 1.5rem;
            display: none;
        }

        .payment-link-box.active {
            display: block;
            animation: slideIn 0.4s ease-out;
        }

        .payment-link-label {
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
            color: var(--accent);
            text-transform: uppercase;
        }

        .payment-link-display {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid var(--accent);
            padding: 1rem;
            word-break: break-all;
            font-size: 0.85rem;
            font-family: monospace;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        .payment-link-display:hover {
            background: rgba(0, 217, 255, 0.2);
        }

        .copy-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0.7rem 1.5rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 0.5rem;
        }

        .copy-btn:hover {
            background: var(--fg);
        }

        .copy-btn.copied {
            background: var(--success);
        }

        .open-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.7rem 1.5rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .open-btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.6rem;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .line-item {
                grid-template-columns: 1fr;
            }
            .actions {
                grid-template-columns: 1fr;
            }
            .form-wrapper {
                padding: 1.5rem;
            }
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CRUISE THE CREEK</h1>
            <p class="subtitle">// automated invoice generator</p>
        </header>

        <div class="form-wrapper">
            <form id="invoiceForm">
                <!-- Customer Info -->
                <div class="form-section">
                    <div class="section-title">Customer Info</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="customerName">Customer Name *</label>
                            <input type="text" id="customerName" required>
                        </div>
                        <div class="form-group">
                            <label for="customerEmail">Email *</label>
                            <input type="email" id="customerEmail" required>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="customerPhone">Phone</label>
                            <input type="tel" id="customerPhone">
                        </div>
                        <div class="form-group">
                            <label for="customerAddress">Address</label>
                            <input type="text" id="customerAddress">
                        </div>
                    </div>
                </div>

                <!-- Invoice Details -->
                <div class="form-section">
                    <div class="section-title">Invoice Details</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="invoiceNumber">Invoice Number *</label>
                            <input type="text" id="invoiceNumber" value="CTR-001" required>
                        </div>
                        <div class="form-group">
                            <label for="invoiceDate">Invoice Date *</label>
                            <input type="date" id="invoiceDate" required>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="dueDate">Due Date</label>
                            <input type="date" id="dueDate">
                        </div>
                        <div class="form-group">
                            <label for="notes">Payment Notes</label>
                            <input type="text" id="notes" placeholder="e.g., 50% deposit due, balance on pickup">
                        </div>
                    </div>
                </div>

                <!-- Line Items -->
                <div class="form-section">
                    <div class="section-title">Items & Services</div>
                    <div class="line-items-wrapper" id="lineItemsContainer">
                        <div class="line-item">
                            <div class="form-group">
                                <label>Description *</label>
                                <input type="text" class="description" placeholder="e.g., Heybike Ranger S rental" required>
                            </div>
                            <div class="form-group">
                                <label>Qty</label>
                                <input type="number" class="quantity" value="1" min="1" required>
                            </div>
                            <div class="form-group">
                                <label>Price ($) *</label>
                                <input type="number" class="price" step="0.01" placeholder="0.00" required>
                            </div>
                            <button type="button" class="remove-btn" onclick="removeLineItem(this)">Remove</button>
                        </div>
                    </div>
                    <button type="button" class="add-line-btn" onclick="addLineItem()">+ Add Item</button>
                </div>

                <!-- Totals -->
                <div class="form-section">
                    <div class="totals-box">
                        <div class="total-row">
                            <span>Subtotal:</span>
                            <span id="subtotal">$0.00</span>
                        </div>
                        <div class="total-row">
                            <span>Tax:</span>
                            <span id="tax">$0.00</span>
                        </div>
                        <div class="total-row final">
                            <span>TOTAL DUE:</span>
                            <span id="total">$0.00</span>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="form-section">
                    <div class="actions">
                        <button type="button" class="btn-secondary" onclick="resetForm()">Reset</button>
                        <button type="submit" class="btn-primary" id="submitBtn">Create Payment Link</button>
                    </div>
                </div>
            </form>

            <!-- Status Messages -->
            <div class="status-message" id="statusMessage"></div>

            <!-- Payment Link Display -->
            <div class="payment-link-box" id="paymentLinkBox">
                <div class="payment-link-label">Payment Link Ready — Share with Customer:</div>
                <div class="payment-link-display" id="paymentLinkDisplay"></div>
                <div class="button-group">
                    <button type="button" class="copy-btn" onclick="copyPaymentLink()">Copy Link</button>
                    <button type="button" class="open-btn" onclick="openPaymentLink()">Open in Browser</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize
        const today = new Date();
        document.getElementById('invoiceDate').valueAsDate = today;
        
        const dueDate = new Date(today);
        dueDate.setDate(dueDate.getDate() + 14);
        document.getElementById('dueDate').valueAsDate = dueDate;

        // Event listeners
        document.getElementById('invoiceForm').addEventListener('submit', handleSubmit);
        document.getElementById('lineItemsContainer').addEventListener('change', calculateTotals);
        document.getElementById('lineItemsContainer').addEventListener('input', calculateTotals);

        function addLineItem() {
            const container = document.getElementById('lineItemsContainer');
            const newItem = document.createElement('div');
            newItem.className = 'line-item';
            newItem.innerHTML = `
                <div class="form-group">
                    <input type="text" class="description" placeholder="Description" required>
                </div>
                <div class="form-group">
                    <input type="number" class="quantity" value="1" min="1" required>
                </div>
                <div class="form-group">
                    <input type="number" class="price" step="0.01" placeholder="0.00" required>
                </div>
                <button type="button" class="remove-btn" onclick="removeLineItem(this)">Remove</button>
            `;
            container.appendChild(newItem);
            calculateTotals();
        }

        function removeLineItem(btn) {
            btn.parentElement.remove();
            calculateTotals();
        }

        function calculateTotals() {
            const items = document.querySelectorAll('.line-item');
            let subtotal = 0;

            items.forEach(item => {
                const qty = parseFloat(item.querySelector('.quantity').value) || 0;
                const price = parseFloat(item.querySelector('.price').value) || 0;
                subtotal += qty * price;
            });

            const tax = 0;
            const total = subtotal + tax;

            document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
            document.getElementById('tax').textContent = '$' + tax.toFixed(2);
            document.getElementById('total').textContent = '$' + total.toFixed(2);
        }

        function resetForm() {
            document.getElementById('invoiceForm').reset();
            document.getElementById('paymentLinkBox').classList.remove('active');
            document.getElementById('statusMessage').classList.remove('active', 'error', 'loading');
            calculateTotals();
            
            const today = new Date();
            document.getElementById('invoiceDate').valueAsDate = today;
            const dueDate = new Date(today);
            dueDate.setDate(dueDate.getDate() + 14);
            document.getElementById('dueDate').valueAsDate = dueDate;
        }

        async function handleSubmit(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const total = parseFloat(document.getElementById('total').textContent.replace('$', ''));

            if (total <= 0) {
                showStatus('Total must be greater than $0', 'error');
                return;
            }

            // Collect form data
            const invoiceData = {
                customerName: document.getElementById('customerName').value,
                customerEmail: document.getElementById('customerEmail').value,
                invoiceNumber: document.getElementById('invoiceNumber').value,
                total: total,
                items: []
            };

            document.querySelectorAll('.line-item').forEach(item => {
                const desc = item.querySelector('.description').value;
                const qty = item.querySelector('.quantity').value;
                const price = item.querySelector('.price').value;
                if (desc && price) {
                    invoiceData.items.push({
                        description: desc,
                        quantity: parseFloat(qty),
                        price: parseFloat(price)
                    });
                }
            });

            showStatus('Creating payment link...', 'loading');
            submitBtn.disabled = true;

            try {
                // Call Vercel API endpoint
                const response = await fetch('https://ebike-sales-nu.vercel.app/api/create-payment-link', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(invoiceData)
                });

                const data = await response.json();

                if (response.ok && data.paymentLink) {
                    showStatus(`✓ Payment link created for ${invoiceData.customerName}`, 'success');
                    document.getElementById('paymentLinkDisplay').textContent = data.paymentLink;
                    document.getElementById('paymentLinkBox').classList.add('active');
                } else {
                    showStatus(data.error || 'Failed to create payment link', 'error');
                }
            } catch (err) {
                showStatus('Error: ' + err.message, 'error');
            } finally {
                submitBtn.disabled = false;
            }
        }

        function showStatus(message, type = 'success') {
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.textContent = message;
            statusMsg.className = 'status-message active ' + type;
        }

        function copyPaymentLink() {
            const link = document.getElementById('paymentLinkDisplay').textContent;
            navigator.clipboard.writeText(link).then(() => {
                const btn = event.target;
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy Link';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function openPaymentLink() {
            const link = document.getElementById('paymentLinkDisplay').textContent;
            window.open(link, '_blank');
        }

        calculateTotals();
    </script>
</body>
</html>
