<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --sage:#6B8F71;--forest:#2D4A32;--dark:#1a2e1c;
  --tan:#C9A96E;--cream:#F5F0E8;--cream-w:#fbf7ef;
  --ink:#1a1a1a;--ink-2:#4a4a4a;
}
html,body{height:100%}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--cream);
  min-height:100vh;display:flex;flex-direction:column;line-height:1.75}
a{color:inherit;text-decoration:none;transition:color .2s ease}
button{font-family:inherit}

/* TOP BAR */
.topbar{background:rgba(255,255,255,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:var(--dark);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(0,0,0,.05)}
.brand-logo{height:38px;width:auto;display:block}

/* HERO */
.hero{position:relative;min-height:34vh;padding:64px 24px 48px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  color:#fff;background:var(--forest);overflow:hidden;isolation:isolate}
.hero-topo{position:absolute;inset:0;z-index:-1;opacity:.18;pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 400' preserveAspectRatio='none'><g fill='none' stroke='%23F5F0E8' stroke-width='1.2'><path d='M0,80 Q150,60 300,90 T600,80'/><path d='M0,140 Q150,120 300,150 T600,140'/><path d='M0,200 Q150,180 300,210 T600,200'/><path d='M0,260 Q150,240 300,270 T600,260'/></g></svg>");
  background-size:cover}
.hero-eyebrow{display:inline-block;font-size:.75rem;font-weight:700;letter-spacing:.2em;
  text-transform:uppercase;color:var(--tan);margin-bottom:16px;
  padding:6px 14px;border:1px solid rgba(201,169,110,.3);border-radius:4px;
  background:rgba(26,46,28,.2)}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,7vw,4rem);
  letter-spacing:.02em;line-height:1;margin-bottom:14px}
.hero p{font-size:clamp(1rem,2.4vw,1.1rem);color:rgba(255,255,255,.9);
  max-width:480px;line-height:1.6}

/* BREADCRUMB */
.crumb{max-width:880px;margin:0 auto;padding:24px 24px 0;
  font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--sage)}
.crumb a{color:var(--ink-2)}
.crumb a:hover{color:var(--forest)}
.crumb .sep{color:rgba(0,0,0,.2);margin:0 8px}

/* PLACEHOLDER */
main{flex:1;max-width:780px;margin:0 auto;padding:32px 24px 48px;width:100%}
.placeholder{background:#fff;border:1px dashed rgba(201,169,110,.5);border-radius:8px;
  padding:36px 30px;text-align:center;color:var(--ink-2);
  box-shadow:0 4px 12px rgba(0,0,0,.03)}
.ph-eyebrow{font-size:.7rem;letter-spacing:.15em;font-weight:700;
  text-transform:uppercase;color:var(--sage);margin-bottom:8px}
.ph-title{font-family:'Bebas Neue',sans-serif;font-size:1.75rem;
  letter-spacing:.02em;color:var(--forest);margin-bottom:10px;line-height:1.1}
.ph-note{font-size:1rem;line-height:1.6;max-width:520px;margin:0 auto}
.back-cta{display:inline-flex;align-items:center;gap:8px;margin-top:24px;
  background:var(--forest);color:#fff;padding:12px 24px;border-radius:4px;
  font-weight:700;font-size:.9rem;letter-spacing:.04em;
  transition:background .2s ease}
.back-cta:hover{background:var(--dark)}
.back-cta svg{width:14px;height:14px}

/* FOOTER */
footer{background:var(--dark);color:rgba(255,255,255,.65);padding:32px 24px;
  text-align:center;font-size:.85rem;letter-spacing:.02em}
footer a{color:var(--tan);font-weight:500}
footer a:hover{color:#fff}

@media(max-width:380px){
  .topbar{padding:12px 16px}.brand-logo{height:32px}
  .hero{padding:48px 16px 36px}main{padding:24px 16px 36px}
  .placeholder{padding:26px 18px}
}
</style>
