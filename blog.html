<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog | Cruise the Creek</title>
<meta name="description" content="Trail news, e-bike know-how, and stories from the Mahoning Valley — from Cruise the Creek in Youngstown, Ohio.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --sage:#6B8F71;--forest:#2D4A32;--forest-l:#3a5d40;--dark:#1a2e1c;
  --tan:#C9A96E;--tan-d:#a98843;--cream:#F5F0E8;--cream-w:#fbf7ef;
  --ink:#1a1a1a;--ink-2:#4a4a4a;--ink-3:#7a7a7a;
}
html,body{height:100%}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--cream);
  min-height:100vh;display:flex;flex-direction:column;line-height:1.6}
a{color:inherit;text-decoration:none;transition:color .2s ease}
button{font-family:inherit;cursor:pointer;border:none;background:none}

.topbar{background:rgba(255,255,255,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:var(--dark);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(0,0,0,.05)}
.brand-logo{height:38px;width:auto;display:block}

.hero{position:relative;min-height:34vh;padding:64px 24px 52px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  color:#fff;background:var(--forest);overflow:hidden;isolation:isolate}
.hero-topo{position:absolute;inset:0;z-index:-1;opacity:.18;pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 400' preserveAspectRatio='none'><g fill='none' stroke='%23F5F0E8' stroke-width='1.2'><path d='M0,80 Q150,60 300,90 T600,80'/><path d='M0,140 Q150,120 300,150 T600,140'/><path d='M0,200 Q150,180 300,210 T600,200'/><path d='M0,260 Q150,240 300,270 T600,260'/></g></svg>");background-size:cover}
.hero-eyebrow{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.2em;
  text-transform:uppercase;color:var(--tan);margin-bottom:14px;
  padding:6px 14px;border:1px solid rgba(201,169,110,.35);border-radius:4px;background:rgba(26,46,28,.2)}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,8vw,4.4rem);
  letter-spacing:.02em;line-height:1;margin-bottom:14px}
.hero p{font-size:clamp(1rem,2.4vw,1.1rem);color:rgba(255,255,255,.88);
  max-width:560px;line-height:1.6}

.crumb{max-width:1080px;margin:0 auto;padding:18px 24px 0;
  font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--sage)}
.crumb a{color:var(--ink-2)}.crumb a:hover{color:var(--forest)}
.crumb .sep{color:rgba(0,0,0,.2);margin:0 8px}

main{flex:1;max-width:1080px;width:100%;margin:0 auto;padding:32px 24px 64px}

/* FILTER CHIPS */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.chip{padding:8px 16px;border:1px solid rgba(45,74,50,.15);border-radius:99px;
  background:#fff;color:var(--ink-2);font-size:.82rem;font-weight:700;letter-spacing:.04em;
  transition:all .15s ease}
.chip:hover{border-color:var(--forest);color:var(--forest)}
.chip.is-active{background:var(--forest);color:#fff;border-color:var(--forest)}

/* POST GRID */
.posts{display:grid;grid-template-columns:1fr;gap:18px}
@media(min-width:640px){.posts{grid-template-columns:repeat(2,1fr);gap:22px}}
@media(min-width:960px){.posts{grid-template-columns:repeat(3,1fr)}}
.post-card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:8px;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 4px 12px rgba(0,0,0,.04);transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease}
.post-card:hover{transform:translateY(-3px);box-shadow:0 14px 32px rgba(45,74,50,.1);border-color:var(--sage)}
.post-thumb{position:relative;aspect-ratio:16/10;background:linear-gradient(135deg,var(--cream-w),var(--cream));
  overflow:hidden}
.post-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.post-thumb-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.04em;color:var(--ink-3);text-transform:uppercase}
.post-body{padding:18px 20px 22px;display:flex;flex-direction:column;flex:1;gap:8px}
.post-meta{display:flex;align-items:center;gap:10px;font-size:.7rem;letter-spacing:.12em;
  text-transform:uppercase;font-weight:700;color:var(--tan-d)}
.post-meta .dot{color:rgba(0,0,0,.18)}
.post-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;line-height:1.1;color:var(--forest);
  letter-spacing:.02em;text-transform:uppercase;margin:2px 0 4px}
.post-excerpt{font-size:.9rem;line-height:1.55;color:var(--ink-2);flex:1}
.post-readmore{margin-top:10px;display:inline-flex;align-items:center;gap:6px;
  font-size:.78rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--forest)}
.post-readmore svg{width:12px;height:12px;transition:transform .2s ease}
.post-card:hover .post-readmore svg{transform:translateX(3px)}

/* EMPTY / LOADING */
.empty{padding:48px 24px;text-align:center;color:var(--ink-3);font-size:.95rem;
  background:#fff;border:1px dashed rgba(0,0,0,.1);border-radius:8px}
.skel{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:8px;overflow:hidden}
.skel-thumb{aspect-ratio:16/10;background:linear-gradient(90deg,#f1ebde 25%,#e8e0cf 50%,#f1ebde 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite}
.skel-body{padding:18px 20px}
.skel-line{height:14px;background:#ece2cf;border-radius:4px;margin-bottom:8px}
.skel-line.title{height:22px;margin-bottom:12px;width:80%}
.skel-line.short{width:55%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

footer{background:var(--dark);color:rgba(255,255,255,.7);padding:32px 24px;
  text-align:center;font-size:.85rem;letter-spacing:.02em;border-top:2px solid var(--tan)}
footer a{color:var(--tan);font-weight:500}footer a:hover{color:#fff}

@media(max-width:480px){
  .topbar{padding:12px 16px}.brand-logo{height:32px}
  .hero{padding:48px 16px 36px}
  .crumb{padding:14px 16px 0}
  main{padding:22px 16px 48px}
}
</style>
</head>
<body>

<header class="topbar">
  <a href="home.html" aria-label="Cruise the Creek home"><img class="brand-logo" src="BlackonTransparent.png" alt="Cruise the Creek"></a>
</header>

<section class="hero">
  <div class="hero-topo"></div>
  <span class="hero-eyebrow">From the trail</span>
  <h1>The Blog</h1>
  <p>Trail news, e-bike know-how, and stories from the Mahoning Valley — straight from Pat and the Cruise the Creek crew.</p>
</section>

<nav class="crumb"><a href="home.html">Home</a><span class="sep">/</span> Blog</nav>

<main>
  <div class="filters" id="filters" hidden>
    <button type="button" class="chip is-active" data-tag="">All</button>
  </div>

  <div class="posts" id="posts">
    <!-- Skeleton cards while CMS loads -->
    <div class="skel"><div class="skel-thumb"></div><div class="skel-body"><div class="skel-line title"></div><div class="skel-line"></div><div class="skel-line short"></div></div></div>
    <div class="skel"><div class="skel-thumb"></div><div class="skel-body"><div class="skel-line title"></div><div class="skel-line"></div><div class="skel-line short"></div></div></div>
    <div class="skel"><div class="skel-thumb"></div><div class="skel-body"><div class="skel-line title"></div><div class="skel-line"></div><div class="skel-line short"></div></div></div>
  </div>
</main>

<footer>
  &copy; 2026 <a href="home.html">Cruise the Creek</a> &middot; <a href="shop.html">Shop</a> &middot; <a href="rentals.html">Rentals</a>
</footer>

<script>
const MENU_URL = 'https://script.google.com/macros/s/AKfycbxjg2ZsPCZNsmJEStYA0bRdsnkm4nNS-m-HNhm_Gin56VIVeYWVRE5j51j30zVHhb4PmQ/exec?page=blog';
const CACHE_KEY = 'cms:blog:v1';

let POSTS = [];
let ACTIVE_TAG = '';

function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function stripTags(s){ return String(s || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim(); }
function resolveImg(src){
  const v = String(src || '').trim();
  if (!v) return '';
  if (/^(https?:|data:)/.test(v)) return v;
  return 'media/' + v.replace(/^(media|images)\//, '');
}
function fmtDate(iso){
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}
function readTime(html){
  const words = stripTags(html).split(/\s+/).filter(Boolean).length;
  return Math.max(1, Math.round(words / 200)) + ' min read';
}

function renderTags(){
  const filters = document.getElementById('filters');
  const all = new Set();
  POSTS.forEach(p => String(p.tags || '').split(',').forEach(t => {
    const v = t.trim();
    if (v) all.add(v);
  }));
  if (all.size === 0) { filters.hidden = true; return; }
  filters.hidden = false;
  filters.innerHTML = '<button type="button" class="chip' + (ACTIVE_TAG === '' ? ' is-active' : '') + '" data-tag="">All</button>'
    + Array.from(all).sort().map(t =>
      '<button type="button" class="chip' + (ACTIVE_TAG === t ? ' is-active' : '') + '" data-tag="' + esc(t) + '">' + esc(t) + '</button>'
    ).join('');
  filters.querySelectorAll('.chip').forEach(b => b.addEventListener('click', () => {
    ACTIVE_TAG = b.dataset.tag;
    renderTags();
    renderPosts();
  }));
}

function renderPosts(){
  const grid = document.getElementById('posts');
  let list = POSTS;
  if (ACTIVE_TAG) {
    list = POSTS.filter(p => String(p.tags || '').split(',').map(t => t.trim()).indexOf(ACTIVE_TAG) !== -1);
  }
  if (list.length === 0) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No posts here yet — check back soon.</div>';
    return;
  }
  grid.innerHTML = list.map(p => {
    const hero = resolveImg(p.hero);
    const excerpt = p.excerpt || stripTags(p.body_html || '').slice(0, 200) + '…';
    return `
      <a class="post-card" href="blog-post.html?slug=${encodeURIComponent(p.slug)}">
        <div class="post-thumb">
          ${hero ? `<img src="${esc(hero)}" alt="${esc(p.title)}" loading="lazy" onerror="this.remove()">` : ''}
          ${hero ? '' : '<div class="post-thumb-empty">Cruise the Creek</div>'}
        </div>
        <div class="post-body">
          <div class="post-meta">
            <span>${esc(fmtDate(p.date))}</span>
            <span class="dot">·</span>
            <span>${esc(readTime(p.body_html))}</span>
          </div>
          <h2 class="post-title">${esc(p.title)}</h2>
          <p class="post-excerpt">${esc(excerpt)}</p>
          <span class="post-readmore">Read post <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
        </div>
      </a>`;
  }).join('');
}

function applyData(d){
  POSTS = Array.isArray(d.blog) ? d.blog : [];
  renderTags();
  renderPosts();
}

function readCache(){ try { const r = localStorage.getItem(CACHE_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; } }
function writeCache(d){ try { localStorage.setItem(CACHE_KEY, JSON.stringify(d)); } catch(e) {} }

const cached = readCache();
if (cached) applyData(cached);

fetch(MENU_URL, { cache: 'no-store' })
  .then(r => r.ok ? r.json() : Promise.reject(r.status))
  .then(remote => {
    if (!remote || typeof remote !== 'object') return;
    writeCache(remote);
    applyData(remote);
  })
  .catch(err => {
    console.warn('[blog] config fetch failed:', err);
    if (!cached) {
      document.getElementById('posts').innerHTML = '<div class="empty" style="grid-column:1/-1">Couldn\'t load posts right now. Refresh in a moment.</div>';
    }
  });
</script>

</body>
</html>
